name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Unit tests --------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --reporters=default

      - name: Notify Mattermost - Tests
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          if [ "$STATUS" != "success" ]; then EMOJI="❌"; fi

          curl -s -X POST "${{ secrets.MATTERMOST_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"$EMOJI **Unit Tests $STATUS** on \`${{ github.ref_name }}\`\n
              **Commit:** ${{ github.sha }}\n
              **Message:** ${{ github.event.head_commit.message }}\n
              **Author:** ${{ github.actor }}\n
              **Run:** [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
            }"

  # --- Code coverage --------------------------------------------------
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Notify Mattermost - Coverage
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="📊"
          if [ "$STATUS" != "success" ]; then EMOJI="❌"; fi

          curl -s -X POST "${{ secrets.MATTERMOST_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"$EMOJI **Coverage Report $STATUS** on \`${{ github.ref_name }}\`\n
              **Commit:** ${{ github.sha }}\n
              **Message:** ${{ github.event.head_commit.message }}\n
              **Author:** ${{ github.actor }}\n
              **Run:** [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
            }"